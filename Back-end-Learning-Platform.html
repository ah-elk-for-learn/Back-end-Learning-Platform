                practicalExample: `Create a file. Make it say "Hello World". Type "git add hello.py". Type "git commit -m 'Add hello world'". Now your code is saved. Change it to "Hello Backend". Type "git add hello.py". Type "git commit -m 'Update message'". Now you have 2 versions you can go back to.`,

              document.body.classList.add('bg-white', 'text-gray-900');

        // ============================================================================
        // ASSESSMENT QUIZ COMPONENT
        // ============================================================================

        function AssessmentQuiz({ skill, assessment, currentQuestion, onNext, onSubmit, darkMode }) {
          const question = assessment.questions[currentQuestion];
          const [selectedAnswer, setSelectedAnswer] = useState(null);
          const [answered, setAnswered] = useState(false);
          const [score, setScore] = useState(0);

          if (!question) {
            // Calculate final score
            const finalScore = (score / assessment.questions.length) * 100;
            return (
              <div className="text-center">
                <p className={`text-4xl font-bold mb-2 ${finalScore >= 70 ? 'text-green-500' : 'text-orange-500'}`}>
                  {Math.round(finalScore)}%
                </p>
                <p className={`mb-4 ${finalScore >= 70 ? 'text-green-600 dark:text-green-400' : 'text-orange-600 dark:text-orange-400'}`}>
                  {finalScore >= 90 ? 'Perfect!' : finalScore >= 70 ? 'Great job!' : 'Review and try again'}
                </p>
                <button
                  onClick={() => onSubmit(Math.round(finalScore))}
                  className={`px-6 py-2 rounded-lg font-semibold ${darkMode ? 'bg-blue-600 hover:bg-blue-700' : 'bg-blue-500 hover:bg-blue-600'} text-white transition`}
                >
                  Save Score & Continue
                </button>
              </div>
            );
          }

          const handleSelectAnswer = (index) => {
            setSelectedAnswer(index);
            setAnswered(true);
            if (index === question.correct) {
              setScore(score + 1);
            }
          };

          return (
            <div>
              <div className="mb-6">
                <div className="flex items-center justify-between mb-4">
                  <p className={`text-sm font-semibold ${darkMode ? 'text-gray-400' : 'text-gray-600'}`}>
                    Question {currentQuestion + 1} of {assessment.questions.length}
                  </p>
                  <div className="w-24 h-2 bg-gray-300 rounded-full overflow-hidden">
                    <div
                      className="h-full bg-blue-500"
                      style={{ width: `${((currentQuestion + 1) / assessment.questions.length) * 100}%` }}
                    />
                  </div>
                </div>
                <h3 className="text-xl font-bold mb-6">{question.question}</h3>
              </div>

              <div className="space-y-3 mb-6">
                {question.options.map((option, index) => (
                  <button
                    key={index}
                    onClick={() => !answered && handleSelectAnswer(index)}
                    disabled={answered}
                    className={`w-full p-4 text-left rounded-lg font-semibold transition ${
                      selectedAnswer === index
                        ? index === question.correct
                          ? 'bg-green-500 text-white'
                          : 'bg-red-500 text-white'
                        : answered && index === question.correct
                        ? 'bg-green-500 text-white'
                        : darkMode ? 'bg-gray-700 hover:bg-gray-600' : 'bg-gray-100 hover:bg-gray-200'
                    } ${answered ? 'cursor-not-allowed' : 'cursor-pointer'}`}
                  >
                    {option}
                  </button>
                ))}
              </div>

              {answered && (
                <div className={`p-4 rounded-lg mb-6 ${darkMode ? 'bg-blue-900 text-blue-200' : 'bg-blue-100 text-blue-800'}`}>
                  <p className="font-semibold mb-2">Explanation:</p>
                  <p>{question.explanation}</p>
                </div>
              )}

              {answered && (
                <button
                  onClick={() => onNext(currentQuestion)}
                  className={`w-full px-6 py-3 rounded-lg font-semibold ${
                    darkMode ? 'bg-blue-600 hover:bg-blue-700' : 'bg-blue-500 hover:bg-blue-600'
                  } text-white transition`}
                >
                  {currentQuestion === assessment.questions.length - 1 ? 'See Results' : 'Next Question'}
                </button>
              )}
            </div>
          );
        }

        // ============================================================================

        function FAQItem({ question, answer, darkMode }) {
          const [open, setOpen] = useState(false);

          return (
            <div className={`rounded-xl border ${darkMode ? 'border-gray-700' : 'border-gray-200'} overflow-hidden`}>

                  darkMode ? 'bg-gray-800 hover:bg-gray-700' : 'bg-gray-50 hover:bg-gray-100'
                }`}
              >
                <span className="text-left">{question}</span>
                {open ? <ChevronUp size={24} /> : <ChevronDown size={24} />}
              </button>
              {open && (
                <div className={`p-6 border-t ${darkMode ? 'border-gray-700 bg-gray-900' : 'border-gray-200 bg-white'}`}>
                  <p className={darkMode ? 'text-gray-300' : 'text-gray-700'}>{answer}</p>
                </div>
              )}
            </div>
          );
        }

        // Initialize and render the app
        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<BackendLearningPlatform />);
    </script>
</body>
</html>
